name: Deploy parcel map to GitHub Pages

# Publishes the static site in web/ (MapLibre + PMTiles) to GitHub Pages.
# Set Settings → Pages → Source = "GitHub Actions" once, then this runs on
# every push to main (or manually via "Run workflow").

on:
  push:
    branches: [main]
    paths: [web/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
