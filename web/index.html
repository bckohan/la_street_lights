<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>LA Street-Light Assessment — Parcel Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    #panel {
      position: absolute; top: 12px; left: 12px; z-index: 1;
      background: rgba(255,255,255,.94); padding: 12px 14px; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.3); max-width: 270px; font-size: 13px;
    }
    #panel h1 { font-size: 15px; margin: 0 0 6px; }
    #panel p { margin: 0 0 8px; color: #333; }
    .legend-row { display: flex; align-items: center; margin: 3px 0; }
    .swatch { width: 16px; height: 16px; border-radius: 3px; margin-right: 8px;
              border: 1px solid rgba(0,0,0,.25); flex: none; }
    .swatch-line { width: 16px; height: 0; border-top: 3px solid #d11; margin-right: 8px; flex: none; }
    .maplibregl-popup-content { font-size: 13px; }
    .maplibregl-popup-content b { font-size: 13px; }
    #status { color: #888; font-style: italic; }
    #search {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      z-index: 2; width: 340px; max-width: 70vw; font-size: 13px;
    }
    #search-input {
      width: 100%; box-sizing: border-box; padding: 9px 12px; border-radius: 8px;
      border: 1px solid #bbb; box-shadow: 0 1px 6px rgba(0,0,0,.3); outline: none;
    }
    #search-results {
      list-style: none; margin: 4px 0 0; padding: 0; background: #fff;
      border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,.3); overflow: hidden;
    }
    #search-results li { padding: 8px 12px; cursor: pointer; border-top: 1px solid #eee; }
    #search-results li:first-child { border-top: none; }
    #search-results li:hover, #search-results li.active { background: #eef4fb; }
    #search-results:empty { display: none; }
    .lu-filter { display: flex; flex-wrap: wrap; margin-top: 3px; }
    .lu-item { display: flex; align-items: center; width: 50%; box-sizing: border-box;
               padding: 1px 0; cursor: pointer; }
    .lu-item input { margin: 0 5px 0 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="search">
    <input id="search-input" type="text" autocomplete="off"
           placeholder="Search an address…" />
    <ul id="search-results"></ul>
  </div>
  <div id="panel">
    <h1>Street-Light Assessment</h1>
    <p>City of Los Angeles parcels, colored by annual assessment. Click a parcel for details.</p>
    <div id="legend"><span id="status">Loading…</span></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
